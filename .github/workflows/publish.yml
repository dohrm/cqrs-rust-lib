name: Publish

on:
  push:
    tags: [ 'v[0-9]*' ]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings
      - name: Test (lib)
        run: cargo test --all-features
      - name: Test (bank)
        run: cargo test -p bank --all-features
        env:
          MONGODB_TEST_URI: mongodb://localhost:27017
      - name: Test (todolist)
        run: cargo test -p todolist --all-features
        env:
          PG_TEST_URI: postgres://postgres:postgres@localhost:5432/postgres
      - name: Test (ludotheque)
        run: cargo test -p ludotheque --all-features

  publish:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-edit
        run: cargo install cargo-edit --locked
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version $VERSION"
          cargo set-version -p cqrs-rust-lib "$VERSION"
      - name: Publish to crates.io
        run: cargo publish -p cqrs-rust-lib
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

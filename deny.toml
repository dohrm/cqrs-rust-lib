# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # hickory-proto via mongodb 3.x — fix blocked on mongodb upstream update
    "RUSTSEC-2026-0119",
    # rsa via surrealdb/jsonwebtoken — no fixed version available
    "RUSTSEC-2023-0071",
    # rustls-webpki via mongodb 3.x (tokio-rustls 0.24) — fix blocked on mongodb upstream
    "RUSTSEC-2026-0104",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    # slab via tower/quinn/h2 — transitive, cannot pin directly
    "RUSTSEC-2025-0047",
    # rand unsound only when used inside a custom logger impl — not our use case
    "RUSTSEC-2026-0097",
    # unmaintained crates from transitive deps (surrealdb, utoipa-axum, mongodb)
    "RUSTSEC-2025-0141",  # bincode via surrealdb-core
    "RUSTSEC-2024-0436",  # paste via utoipa-axum / rmcp
    "RUSTSEC-2025-0134",  # rustls-pemfile via mongodb
    "RUSTSEC-2023-0089",  # atomic-polyfill via surrealdb-core
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "LicenseRef-Proprietary",
    "MPL-2.0",
    "Unlicense",
    # SurrealDB uses BUSL-1.1 (converts to Apache-2.0 after 4 years)
    "BUSL-1.1",
]
# surrealdb packages don't include license field in their manifests
exceptions = [
    { allow = ["BUSL-1.1"], name = "surrealdb" },
    { allow = ["BUSL-1.1"], name = "surrealdb-core" },
    { allow = ["BUSL-1.1"], name = "surrealdb-types" },
    { allow = ["BUSL-1.1"], name = "surrealdb-types-derive" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]